---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install baseline packages
  apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - auditd
      - curl
    state: present

- name: Create deploy group
  group:
    name: deploy
    state: present

- name: Create non-root sudo users
  user:
    name: "{{ item }}"
    groups: deploy,sudo
    shell: /bin/bash
    create_home: true
  loop: "{{ allowed_ssh_users }}"

- name: Disable SSH root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart sshd

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: restart sshd

- name: Set SSH port
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port'
    line: "Port {{ ssh_port }}"
  notify: restart sshd

- name: Configure UFW default policies
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow required TCP ports through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_allowed_tcp_ports }}"

- name: Configure fail2ban for sshd
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = {{ ssh_port }}
      bantime = {{ fail2ban_bantime }}
      maxretry = {{ fail2ban_maxretry }}
  notify: restart fail2ban

- name: Enable unattended security upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  when: unattended_upgrades_enabled

- name: Ensure auditd is enabled and running
  systemd:
    name: auditd
    enabled: true
    state: started
